<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Integrasi Sosial Nusantara{% endblock %}</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/app.css') }}"
    />
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="animated-bg"></div>
    <div class="batik-texture"></div>

    <nav class="navbar">
      <ul class="nav-menu">
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('materi') }}">Materi</a></li>
        <li><a href="{{ url_for('video') }}">Video</a></li>
        <li><a href="{{ url_for('quiz') }}">Quiz</a></li>
        <li><a href="{{ url_for('chat') }}">Diskusi AI</a></li>
      </ul>
      <div class="brand-group">
        <a class="logo" href="{{ url_for('index') }}">
          <img
            src="{{ url_for('static', filename='images/logo.jpg.jpeg') }}"
            alt="Tiger House Kuning"
          />
        </a>
        <a
          class="instagram-link"
          href="https://www.instagram.com/housekuning?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="
          target="_blank"
          rel="noopener noreferrer"
        >
          Instagram
        </a>
      </div>
    </nav>

    <div class="main-container">{% block content %}{% endblock %}</div>

    {% block scripts %}{% endblock %}
  </body>
</html>
